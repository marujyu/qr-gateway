<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qr-gateway</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f7fb;
      color: #1f2937;
    }
    .card {
      max-width: 760px;
      margin: 24px auto;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      color: #005bbb;
    }
    .muted {
      color: #666;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0;
    }
    button {
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }
    button.primary {
      border-color: #005bbb;
      background: #005bbb;
      color: #fff;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    #reader {
      width: 100%;
      max-width: 560px;
      margin: 12px 0;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      font-size: 14px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    input[type="file"] {
      display: block;
      margin: 10px 0;
    }
    .status {
      margin-top: 12px;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      display: none;
      line-height: 1.6;
      word-break: break-all;
    }
    .status.show { display: block; }
    .status.ok {
      color: #0a7;
      background: #eaf9ef;
    }
    .status.ng {
      color: #c00;
      background: #fdeeee;
    }
    a {
      word-break: break-all;
    }
    code {
      display: inline-block;
      background: rgba(0,0,0,0.04);
      padding: 2px 4px;
      border-radius: 4px;
      white-space: pre-wrap;
    }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <div class="card">
    <h1>QRゲート（旧→新）</h1>
    <div class="muted">
      このページからQRを読み取ると、旧フォームQRでも新Webアプリへ自動で移動します。
    </div>

    <div class="row">
      <button class="primary" id="startBtn">スキャン開始</button>
      <button id="stopBtn" disabled>停止</button>
    </div>

    <div id="reader"></div>

    <div class="muted">読み取りにくい場合は、QR画像から読み取ることもできます。</div>
    <input type="file" id="imageInput" accept="image/*">

    <div class="muted">保険用：QRの中身URLを貼り付けても解決できます。</div>
    <textarea id="urlInput" placeholder="ここに旧URLまたは新URLを貼り付け"></textarea>

    <div class="row">
      <button id="resolveBtn">解決して移動</button>
    </div>

    <div class="status" id="status"></div>
  </div>

<script>
  // 本体URL
  const NEW_APP_BASE = "https://script.google.com/macros/s/AKfycbymQ38NePg8TM6bUfgQhFE34fN-0ssKP8OUl4yxWYExNVWyIFe-XUVfdH-g-X0hrsR6/exec";

  // CONFIG: form_id ごとの entry 設定
  const CONFIG = {
    "1FAIpQLSctg5egf5P0heDhSv_buehOF1Q1dNJsz4lhihPO0o3EoK0yIQ": {
      entry_id: "entry.87256745",
      entry_product_no: "entry.1899071023"
    }
  };

  // MAP: product_no → id
  const MAP = {
    "40-588-6101-1_塗装": "142"
  };

  let scanner = null;

  function setStatus(msg, ok = false) {
    const el = document.getElementById("status");
    el.className = "status show " + (ok ? "ok" : "ng");
    el.innerHTML = msg;
  }

  async function startScan() {
    if (scanner) return;

    setStatus("カメラを起動しています...", true);

    scanner = new Html5Qrcode("reader");
    const config = {
      fps: 15,
      qrbox: function(viewfinderWidth, viewfinderHeight) {
        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        const size = Math.floor(minEdge * 0.8);
        return { width: size, height: size };
      },
      aspectRatio: 1.0,
      disableFlip: false,
      rememberLastUsedCamera: true
    };

    try {
      await scanner.start(
        { facingMode: { exact: "environment" } },
        config,
        (decodedText) => {
          stopScan();
          resolveText(decodedText);
        },
        (_errorMessage) => {
          // 読み取り途中の失敗は無視
        }
      );
      document.getElementById("stopBtn").disabled = false;
      setStatus("QRを枠内に入れてください。少し離して全体が入るようにすると読み取りやすいです。", true);
    } catch (e1) {
      try {
        await scanner.start(
          { facingMode: "environment" },
          config,
          (decodedText) => {
            stopScan();
            resolveText(decodedText);
          },
          (_errorMessage) => {
            // 読み取り途中の失敗は無視
          }
        );
        document.getElementById("stopBtn").disabled = false;
        setStatus("QRを枠内に入れてください。", true);
      } catch (e2) {
        setStatus(
          "カメラを起動できませんでした。ブラウザの権限設定を確認してください。<br>" +
          escapeHtml(String(e2))
        );
        scanner = null;
      }
    }
  }

  async function stopScan() {
    if (!scanner) return;
    try { await scanner.stop(); } catch (e) {}
    try { await scanner.clear(); } catch (e) {}
    scanner = null;
    document.getElementById("stopBtn").disabled = true;
  }

  async function scanImageFile(file) {
    if (!file) return;

    setStatus("画像からQRを解析しています...", true);

    const tempScanner = new Html5Qrcode("reader");
    try {
      const decodedText = await tempScanner.scanFile(file, true);
      resolveText(decodedText);
    } catch (e) {
      setStatus("画像からQRを読み取れませんでした。別の画像か、通常スキャンを試してください。<br>" + escapeHtml(String(e)));
    } finally {
      try { await tempScanner.clear(); } catch (e) {}
    }
  }

  function resolveText(text) {
    try {
      const raw = String(text || "").trim();

      if (!raw) {
        setStatus("読み取り結果が空です。");
        return;
      }

      // まず生データを表示
      setStatus("読み取り結果:<br><code>" + escapeHtml(raw) + "</code>", true);

      // 新URLはそのまま
      if (raw.includes("script.google.com/macros/") && raw.includes("product_id=")) {
        const url = raw;
        setStatus(
          "新URLを検出しました。移動します。<br><a href='" +
          escapeAttr(url) +
          "'>" +
          escapeHtml(url) +
          "</a>",
          true
        );
        window.location.href = url;
        return;
      }

      // 旧URL（許容を少し広げる）
      if (raw.includes("docs.google.com/forms/") || raw.includes("forms.gle/")) {
        const parsed = parseOldFormUrl(raw);

        if (!parsed.ok) {
          setStatus(
            parsed.message + "<br><br>読み取り結果:<br><code>" + escapeHtml(raw) + "</code>"
          );
          return;
        }

        let id = parsed.id || "";

        if (!id && parsed.productNo) {
          id = MAP[parsed.productNo] || "";
        }

        if (!id) {
          setStatus(
            "製品IDを特定できませんでした。<br>" +
            "製品番号: <code>" + escapeHtml(parsed.productNo || "") + "</code><br><br>" +
            "読み取り結果:<br><code>" + escapeHtml(raw) + "</code>"
          );
          return;
        }

        const url = NEW_APP_BASE + "?product_id=" + encodeURIComponent(id);

        setStatus(
          "移動します...<br><a href='" +
          escapeAttr(url) +
          "'>" +
          escapeHtml(url) +
          "</a>",
          true
        );

        window.location.href = url;
        return;
      }

      setStatus(
        "QRの形式が不明です。<br><br>読み取り結果:<br><code>" +
        escapeHtml(raw) +
        "</code>"
      );

    } catch (e) {
      setStatus("解析に失敗しました。<br>" + escapeHtml(String(e)));
    }
  }

  function parseOldFormUrl(oldUrl) {
    const url = String(oldUrl || "").trim();

    // forms.gle は現時点では form_id を抜けないので、そのまま案内
    if (url.includes("forms.gle/")) {
      return {
        ok: false,
        message: "短縮URL（forms.gle）はまだ未対応です。展開後の本URLが必要です。"
      };
    }

    const m = url.match(/\/forms\/d\/e\/([^/?]+)\/viewform/);
    const formId = m ? m[1] : "";

    if (!formId) {
      return {
        ok: false,
        message: "フォームIDを抽出できませんでした。"
      };
    }

    const cfg = CONFIG[formId];
    if (!cfg) {
      return {
        ok: false,
        message: "このQRはまだ未登録です。form_id: " + escapeHtml(formId)
      };
    }

    const query = url.split("?")[1] || "";
    const params = {};

    query.split("&").forEach(pair => {
      if (!pair) return;
      const eq = pair.indexOf("=");
      const key = eq >= 0 ? pair.slice(0, eq) : pair;
      const val = eq >= 0 ? pair.slice(eq + 1) : "";
      if (!key) return;
      params[key] = decodeURIComponent(String(val || "").replace(/\+/g, " "));
    });

    const rawId = params[cfg.entry_id] || "";
    const rawProductNo = params[cfg.entry_product_no] || "";

    const id = rawId ? (String(rawId).match(/\d+/) || [""])[0] : "";
    const productNo = rawProductNo ? String(rawProductNo).trim() : "";

    if (!id && !productNo) {
      return {
        ok: false,
        message: "IDと製品番号の両方を取得できませんでした。"
      };
    }

    return { ok: true, id, productNo, formId };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[c]));
  }

  function escapeAttr(s) {
    return escapeHtml(s);
  }

  document.getElementById("startBtn").addEventListener("click", startScan);
  document.getElementById("stopBtn").addEventListener("click", stopScan);
  document.getElementById("resolveBtn").addEventListener("click", () => {
    const value = document.getElementById("urlInput").value.trim();
    if (!value) {
      setStatus("URL貼り付け欄が空です。");
      return;
    }
    resolveText(value);
  });
  document.getElementById("imageInput").addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) {
      scanImageFile(file);
    }
  });
</script>
</body>
</html>
