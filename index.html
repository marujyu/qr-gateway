<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qr-gateway</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f7fb;
      color: #1f2937;
    }

    .card {
      max-width: 760px;
      margin: 24px auto;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      color: #005bbb;
    }

    .muted {
      color: #666;
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.7;
    }

    .guide-box {
      margin: 14px 0 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f7fbff;
      border: 1px solid #d9e8ff;
      font-size: 14px;
      line-height: 1.7;
    }

    .guide-title {
      font-weight: 700;
      color: #005bbb;
      margin-bottom: 6px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    button {
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    button.primary {
      border-color: #005bbb;
      background: #005bbb;
      color: #fff;
    }

    button.sub {
      border-color: #2f6feb;
      color: #2f6feb;
      background: #eef5ff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .reader-wrap {
      position: relative;
      width: 100%;
      max-width: 560px;
      margin: 12px 0;
      border-radius: 14px;
      overflow: hidden;
      background: #111;
    }

    #reader {
      width: 100%;
      max-width: 560px;
      margin: 0;
    }

    .scan-hint {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 3;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      font-size: 14px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      line-height: 1.5;
    }

    textarea.auto-filled {
      border-color: #2f6feb;
      background: #f7fbff;
    }

    input[type="file"] {
      display: block;
      margin: 10px 0;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      display: none;
      line-height: 1.6;
      word-break: break-all;
    }

    .status.show {
      display: block;
    }

    .status.ok {
      color: #0a7;
      background: #eaf9ef;
    }

    .status.ng {
      color: #c00;
      background: #fdeeee;
    }

    a {
      word-break: break-all;
    }

    code {
      display: inline-block;
      background: rgba(0,0,0,0.04);
      padding: 2px 4px;
      border-radius: 4px;
      white-space: pre-wrap;
    }

    .pulse {
      animation: pulse 0.28s ease-out 1;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="card" id="appCard">
    <h1>QRゲート（旧→新）</h1>

    <div class="muted">
      このページからQRを読み取ると、旧フォームQRでも新Webアプリへ自動で移動します。<br>
      小さいQRは、少し近づけて1秒ほど止めると安定しやすいです。
    </div>

    <div class="guide-box">
      <div class="guide-title">QRが読めない場合</div>
      1. iPhoneのカメラでQRを読み取る<br>
      2. 表示されたURLをコピーする<br>
      3. この画面で「クリップボードを貼り付け」を押す
    </div>

    <div class="row">
      <button class="primary" id="startBtn">スキャン開始</button>
      <button id="stopBtn" disabled>停止</button>
    </div>

    <div class="reader-wrap">
      <div id="reader"></div>
      <div class="scan-hint">小さいQRは少し近づけて、1秒ほど止めると安定します</div>
    </div>

    <div class="muted">読み取りにくい場合は、QR画像から読み取ることもできます。</div>
    <input type="file" id="imageInput" accept="image/*">

    <div class="muted">
      保険用：URLを貼り付けても解決できます。<br>
      うまくいかない場合は、まず「クリップボードを貼り付け」を押してください。
    </div>
    <textarea id="urlInput" placeholder="ここに旧URLまたは新URLを貼り付け"></textarea>

    <div class="row">
      <button class="sub" id="pasteBtn">クリップボードを貼り付け</button>
      <button id="resolveBtn">解決して移動</button>
    </div>

    <div class="status" id="status"></div>
  </div>

<script>
  const NEW_APP_BASE = "https://script.google.com/macros/s/AKfycbymQ38NePg8TM6bUfgQhFE34fN-0ssKP8OUl4yxWYExNVWyIFe-XUVfdH-g-X0hrsR6/exec";

  const CONFIG = {
    "1FAIpQLSctg5egf5P0heDhSv_buehOF1Q1dNJsz4lhihPO0o3EoK0yIQ": {
      entry_id: "entry.87256745",
      entry_product_no: "entry.1899071023"
    }
  };

  const MAP = {
    "40-588-6101-1_塗装": "142"
  };

  let scanner = null;
  let isResolving = false;
  let lastText = "";
  let sameCount = 0;
  let triedClipboardAuto = false;

  function setStatus(msg, ok = false) {
    const el = document.getElementById("status");
    el.className = "status show " + (ok ? "ok" : "ng");
    el.innerHTML = msg;
  }

  function clearStatus() {
    const el = document.getElementById("status");
    el.className = "status";
    el.innerHTML = "";
  }

  function vibrateSuccess() {
    try {
      if (navigator.vibrate) {
        navigator.vibrate([40, 30, 80]);
      }
    } catch (_) {}
  }

  function flashSuccess() {
    const card = document.getElementById("appCard");
    card.classList.remove("pulse");
    void card.offsetWidth;
    card.classList.add("pulse");
  }

  function markBusy(busy) {
    isResolving = busy;
    document.getElementById("startBtn").disabled = busy;
    document.getElementById("resolveBtn").disabled = busy;
    document.getElementById("imageInput").disabled = busy;
    document.getElementById("pasteBtn").disabled = busy;
  }

  function buildScannerConfig() {
    return {
      fps: 12,
      qrbox: function(viewfinderWidth, viewfinderHeight) {
        const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
        const size = Math.floor(minEdge * 0.75);
        return { width: size, height: size };
      },
      aspectRatio: 1.0,
      disableFlip: false,
      rememberLastUsedCamera: true,
      formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE]
    };
  }

  function looksLikeResolvableUrl(text) {
    const s = String(text || "").trim();
    if (!s) return false;

    return (
      s.startsWith("http://") ||
      s.startsWith("https://") ||
      s.includes("docs.google.com/forms/") ||
      s.includes("forms.gle/") ||
      s.includes("script.google.com/macros/")
    );
  }

  function setUrlInputValue(text, fromClipboard = false) {
    const input = document.getElementById("urlInput");
    input.value = String(text || "").trim();

    if (fromClipboard) {
      input.classList.add("auto-filled");
    } else {
      input.classList.remove("auto-filled");
    }
  }

  async function tryClipboardAutoFill() {
    if (triedClipboardAuto) return;
    triedClipboardAuto = true;

    if (!navigator.clipboard || !navigator.clipboard.readText) {
      return;
    }

    try {
      const text = await navigator.clipboard.readText();

      if (!looksLikeResolvableUrl(text)) {
        return;
      }

      setUrlInputValue(text, true);
      setStatus(
        "クリップボードからURLを見つけました。<br>" +
        "内容を確認して「解決して移動」を押してください。",
        true
      );
    } catch (_) {
      // iPhone / Safari では自動読取が拒否されても普通なので無視
    }
  }

  async function pasteFromClipboardAndResolve(autoResolve = true) {
    if (!navigator.clipboard || !navigator.clipboard.readText) {
      setStatus("このブラウザではクリップボード読み取りに対応していません。URLを手で貼り付けてください。");
      return;
    }

    if (isResolving) return;

    try {
      const text = await navigator.clipboard.readText();

      if (!text || !String(text).trim()) {
        setStatus("クリップボードが空です。QRのURLをコピーしてから押してください。");
        return;
      }

      setUrlInputValue(text, true);

      if (!looksLikeResolvableUrl(text)) {
        setStatus(
          "クリップボードの内容はURLではなさそうです。<br><code>" +
          escapeHtml(String(text)) +
          "</code>"
        );
        return;
      }

      if (!autoResolve) {
        setStatus("クリップボードからURLを貼り付けました。", true);
        return;
      }

      markBusy(true);
      vibrateSuccess();
      flashSuccess();
      resolveText(text);

    } catch (e) {
      setStatus(
        "クリップボードを読み取れませんでした。<br>" +
        "iPhoneでは確認メッセージが出る場合があります。もう一度試すか、手で貼り付けてください。<br><br>" +
        escapeHtml(String(e))
      );
    }
  }

  async function startScan() {
    if (scanner || isResolving) return;

    lastText = "";
    sameCount = 0;

    setStatus("カメラを起動しています...", true);
    markBusy(false);

    scanner = new Html5Qrcode("reader");
    const config = buildScannerConfig();

    const onScanSuccess = (decodedText) => {
      if (decodedText === lastText) {
        sameCount++;
      } else {
        lastText = decodedText;
        sameCount = 1;
      }

      if (sameCount < 2) return;
      if (isResolving) return;

      markBusy(true);
      vibrateSuccess();
      flashSuccess();
      resolveText(decodedText);

      setTimeout(() => {
        stopScan();
      }, 80);
    };

    const onScanFailure = (_errorMessage) => {
      // 読み取り途中の失敗は無視
    };

    try {
      await scanner.start(
        { facingMode: { exact: "environment" } },
        config,
        onScanSuccess,
        onScanFailure
      );
      document.getElementById("stopBtn").disabled = false;
      setStatus("小さいQRは少し近づけて、1秒ほど止めると安定します。", true);
    } catch (e1) {
      try {
        await scanner.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );
        document.getElementById("stopBtn").disabled = false;
        setStatus("カメラを起動しました。小さいQRは少し近づけて止めてください。", true);
      } catch (e2) {
        setStatus(
          "カメラを起動できませんでした。ブラウザの権限設定を確認してください。<br>" +
          escapeHtml(String(e2))
        );
        scanner = null;
      }
    }
  }

  async function stopScan() {
    if (!scanner) {
      document.getElementById("stopBtn").disabled = true;
      return;
    }

    try { await scanner.stop(); } catch (_) {}
    try { await scanner.clear(); } catch (_) {}

    scanner = null;
    document.getElementById("stopBtn").disabled = true;
    markBusy(false);
  }

  async function scanImageFile(file) {
    if (!file || isResolving) return;

    markBusy(true);
    setStatus("画像からQRを解析しています...", true);

    const tempScanner = new Html5Qrcode("reader");
    try {
      const decodedText = await tempScanner.scanFile(file, true);
      vibrateSuccess();
      flashSuccess();
      resolveText(decodedText);
    } catch (e) {
      setStatus(
        "画像からQRを読み取れませんでした。別の画像か、通常スキャンを試してください。<br>" +
        escapeHtml(String(e))
      );
      markBusy(false);
    } finally {
      try { await tempScanner.clear(); } catch (_) {}
    }
  }

  function resolveText(text) {
    try {
      const raw = String(text || "").trim();

      if (!raw) {
        setStatus("読み取り結果が空です。");
        markBusy(false);
        return;
      }

      if (raw.includes("script.google.com/macros/") && raw.includes("product_id=")) {
        const url = raw;
        setStatus(
          "新URLを検出しました。移動します。<br><a href='" +
          escapeAttr(url) +
          "'>" +
          escapeHtml(url) +
          "</a>",
          true
        );
        window.location.href = url;
        return;
      }

      if (raw.includes("docs.google.com/forms/") || raw.includes("forms.gle/")) {
        const parsed = parseOldFormUrl(raw);

        if (!parsed.ok) {
          setStatus(
            parsed.message + "<br><br>読み取り結果:<br><code>" + escapeHtml(raw) + "</code>"
          );
          markBusy(false);
          return;
        }

        let id = parsed.id || "";

        if (!id && parsed.productNo) {
          id = MAP[parsed.productNo] || "";
        }

        if (!id) {
          setStatus(
            "製品IDを特定できませんでした。<br>" +
            "製品番号: <code>" + escapeHtml(parsed.productNo || "") + "</code><br><br>" +
            "読み取り結果:<br><code>" + escapeHtml(raw) + "</code>"
          );
          markBusy(false);
          return;
        }

        const url = NEW_APP_BASE + "?product_id=" + encodeURIComponent(id);

        setStatus(
          "移動します...<br><a href='" +
          escapeAttr(url) +
          "'>" +
          escapeHtml(url) +
          "</a>",
          true
        );

        window.location.href = url;
        return;
      }

      setStatus(
        "QRの形式が不明です。<br><br>読み取り結果:<br><code>" +
        escapeHtml(raw) +
        "</code>"
      );
      markBusy(false);

    } catch (e) {
      setStatus("解析に失敗しました。<br>" + escapeHtml(String(e)));
      markBusy(false);
    }
  }

  function parseOldFormUrl(oldUrl) {
    const url = String(oldUrl || "").trim();

    if (url.includes("forms.gle/")) {
      return {
        ok: false,
        message: "短縮URL（forms.gle）はまだ未対応です。展開後の本URLが必要です。"
      };
    }

    const m = url.match(/\/forms\/d\/e\/([^/?]+)\/viewform/);
    const formId = m ? m[1] : "";

    if (!formId) {
      return {
        ok: false,
        message: "フォームIDを抽出できませんでした。"
      };
    }

    const cfg = CONFIG[formId];
    if (!cfg) {
      return {
        ok: false,
        message: "このQRはまだ未登録です。form_id: " + escapeHtml(formId)
      };
    }

    const query = url.split("?")[1] || "";
    const params = {};

    query.split("&").forEach(pair => {
      if (!pair) return;
      const eq = pair.indexOf("=");
      const key = eq >= 0 ? pair.slice(0, eq) : pair;
      const val = eq >= 0 ? pair.slice(eq + 1) : "";
      if (!key) return;
      params[key] = decodeURIComponent(String(val || "").replace(/\+/g, " "));
    });

    const rawId = params[cfg.entry_id] || "";
    const rawProductNo = params[cfg.entry_product_no] || "";

    const id = rawId ? (String(rawId).match(/\d+/) || [""])[0] : "";
    const productNo = rawProductNo ? String(rawProductNo).trim() : "";

    if (!id && !productNo) {
      return {
        ok: false,
        message: "IDと製品番号の両方を取得できませんでした。"
      };
    }

    return { ok: true, id, productNo, formId };
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[c]));
  }

  function escapeAttr(s) {
    return escapeHtml(s);
  }

  document.getElementById("startBtn").addEventListener("click", startScan);
  document.getElementById("stopBtn").addEventListener("click", stopScan);

  document.getElementById("resolveBtn").addEventListener("click", () => {
    const value = document.getElementById("urlInput").value.trim();
    if (!value) {
      setStatus("URL貼り付け欄が空です。");
      return;
    }

    markBusy(true);
    vibrateSuccess();
    flashSuccess();
    resolveText(value);
  });

  document.getElementById("pasteBtn").addEventListener("click", () => {
    pasteFromClipboardAndResolve(true);
  });

  document.getElementById("imageInput").addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) {
      scanImageFile(file);
    }
  });

  window.addEventListener("load", () => {
    setTimeout(() => {
      tryClipboardAutoFill();
    }, 300);
  });
</script>
</body>
</html>
